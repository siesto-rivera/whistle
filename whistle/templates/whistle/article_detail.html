{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center my-4">
    <h2 class="mb-0"><i class="bi bi-newspaper me-2"></i>관련기사</h2>
    <div>
        <a href="{% url 'whistle:article_update' article.pk %}" class="btn btn-outline-primary"><i class="bi bi-pencil me-1"></i>수정</a>
        <a href="{% url 'whistle:article_list' %}" class="btn btn-outline-secondary"><i class="bi bi-list me-1"></i>목록</a>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <table class="table table-bordered mb-0">
            <tr><th style="width:150px;">사건</th><td><a href="{% url 'whistle:case_detail' article.case.pk %}">{{ article.case }}</a></td></tr>
            <tr><th>출처</th><td>{{ article.category }}</td></tr>
            <tr><th>제목</th><td><strong>{{ article.title }}</strong></td></tr>
            <tr><th>URL</th><td>{% if article.link %}<a href="{{ article.link }}" target="_blank">{{ article.link }}</a>{% endif %}</td></tr>
        </table>
    </div>
</div>

{% endblock %}

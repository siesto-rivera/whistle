{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>로그인 - 공익제보 아카이브</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'whistle/img/illust_whistle.svg' %}">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: '#FAF9F5', sand: '#F0EDE6', stone: '#E8E3DC',
                        ink: '#2C2825', smoke: '#8B847C', accent: '#DC143C',
                    },
                    fontFamily: {
                        sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-sans text-ink antialiased bg-beige min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm mx-auto px-6">
    <div class="text-center mb-8">
        <a href="{% url 'whistle_home' %}" class="inline-flex items-center gap-2 font-extrabold text-lg text-ink tracking-tight">
            <img src="{% static 'whistle/img/illust_whistle.svg' %}" class="w-10 h-10" alt="로고">
            공익제보 아카이브
        </a>
    </div>

    <div class="bg-white rounded-2xl border border-stone shadow-sm p-8">
        <h2 class="text-xl font-bold text-center mb-6">로그인</h2>

        {% if form.errors %}
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-xs font-semibold text-smoke mb-1.5">아이디</label>
                <input type="text" name="username" autofocus
                       class="w-full border border-stone rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-accent transition-colors">
            </div>
            <div class="mb-6">
                <label class="block text-xs font-semibold text-smoke mb-1.5">비밀번호</label>
                <input type="password" name="password"
                       class="w-full border border-stone rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-accent transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-accent text-white font-semibold py-2.5 rounded-full hover:bg-red-700 transition-colors shadow-sm">
                로그인
            </button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>

    <div class="text-center mt-6">
        <a href="{% url 'whistle_home' %}" class="text-sm text-smoke hover:text-accent transition-colors">홈으로 돌아가기</a>
    </div>
</div>

</body>
</html>

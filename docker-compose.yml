version: '3'

services:
  nginx:
    build: ./nginx
    ports:
      - 80:80
    depends_on:
      - web
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./:/usr/src/app/
    expose:
      - 8000
    env_file:
      - ./.env.prod
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
